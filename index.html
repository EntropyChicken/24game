    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("serviceWorker.js", { updateViaCache: "none" })
          .then((registration) => {
            console.log("Service Worker registered");

            // check for a new serviceWorker.js right away, and periodically after
            registration.update();
            setInterval(() => registration.update(), 60 * 1000);
          })
          .catch(err => console.error("SW registration failed:", err));

        // reload the page when a new service worker takes over
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          console.log("New service worker activated. Reloading page...");
          location.reload();
        });
      }
    </script>

    <script type="module">
      async function loadFirebase() {
        try {
          if (navigator.onLine === false) {
            throw new Error("Device is offline");
          }

          const [
            { initializeApp },
            { getFirestore, collection, doc, getDoc, setDoc, increment },
            { getAnalytics }
          ] = await Promise.all([
            import("https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js"),
            import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js"),
            import("https://www.gstatic.com/firebasejs/12.1.0/firebase-analytics.js")
          ]);

          const firebaseConfig = {
            apiKey: "AIzaSyCDv8aTBxn5lfQQSA9kP5JQlJ-NNszJJRM",
            authDomain: "make24-1e644.firebaseapp.com",
            projectId: "make24-1e644",
            storageBucket: "make24-1e644.firebasestorage.app",
            messagingSenderId: "770585457003",
            appId: "1:770585457003:web:9145d890d5b59403559c2e",
            measurementId: "G-6CFVM2YNKE"
          };

          const app = initializeApp(firebaseConfig);
          const analytics = getAnalytics(app);

          window.firebaseAppReady = {
            db: getFirestore(app),
            increment: increment, 
            collection: collection, 
            doc: doc,
            getDoc: getDoc,
            setDoc: setDoc,
            isOnlineMode: true,
            isReady: true       
          };
          console.log("Firebase online");
        } catch (err) {
          console.warn("Firebase offline: will use fallback:", err);
          
          window.firebaseAppReady = {
            isOnlineMode: false,
            isReady: false,     
            db: null,
            increment: () => 0, 
            collection: () => {}, 
            doc: () => {},
            getDoc: async () => ({ exists: () => false }),
            setDoc: async () => {}
          };
        } finally {
          document.dispatchEvent(new Event('firebase_initialized'));
        }
      }

      loadFirebase();
    </script>
